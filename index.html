<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#667eea">

<title>To-Do List</title>

<style>
body {
    background: #f8f9fa;
}
.todo-header img {
    width: 80px;
}
.table td, .table th {
    vertical-align: middle;
}
</style>
</head>

<body>

<div class="container mt-5">

    <!-- Header -->
    <div class="text-center todo-header mb-4">
        <img src="icon-192.png">
        <h1 class="mt-3">To-Do List</h1>
        <p class="text-muted">Manage your daily task</p>
    </div>

    <!-- Input -->
    <div class="input-group mb-3">
        <textarea id="todoInput" class="form-control" placeholder="Add new task..."></textarea>
        <button id="addBtn" class="btn btn-primary">Add</button>
    </div>

    <!-- Total -->
    <div class="text-center mb-3">
        Total: <strong><span id="todoCount">0</span></strong>
    </div>

    <!-- Table -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead class="table-light">
                    <tr>
                        <th width="60">No.</th>
                        <th width="100">Check List</th>
                        <th>Task</th>
                        <th width="180">Action</th>
                    </tr>
                </thead>
                <tbody id="todoList"></tbody>
            </table>
        </div>
    </div>

</div>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
